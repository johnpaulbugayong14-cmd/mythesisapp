<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Tasks - Task Management System</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#3b82f6">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
    <h1 style="margin: 0;">✅ My Tasks</h1>
    <div style="display: flex; align-items: center; gap: 1rem;">
      <div id="welcome" class="welcome-message">Welcome, User</div>
      <button onclick="signOutUser()" style="background: #dc2626; color: white; border: none; padding: 0.5rem 1rem; border-radius: 0.375rem; cursor: pointer; font-size: 0.875rem;">Logout</button>
    </div>
  </div>
  
  <div class="card">
    <div id="tasks"></div>
    <p id="emptyState" style="text-align: center; color: #94a3b8; padding: 2rem;">
      No tasks assigned yet. Check back soon!
    </p>
  </div>
</div>

<footer style="text-align: center; padding: 1rem; color: #94a3b8; font-size: 0.8rem; margin-top: 2rem;">
  task assignment system for thesis
</footer>

<script type="module" src="member.js"></script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
